on:
  workflow_call:
    inputs:
      tag-name:
        description: 'Tag name for the release (omit for build-only mode)'
        required: false
        type: string
      upload-artifact:
        description: 'Upload build artifacts (for nightly builds)'
        required: false
        default: false
        type: boolean
      updater-endpoint:
        description: 'Override updater endpoint URL in tauri.conf.json'
        required: false
        type: string
      nightly-version:
        description: 'Override app version for nightly builds (e.g. 0.1.1-nightly.1+abc1234)'
        required: false
        type: string

name: build-tauri

jobs:
  build-tauri:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: '--target aarch64-apple-darwin'
            updater-platform: darwin-aarch64
          - platform: macos-latest
            args: '--target x86_64-apple-darwin'
            updater-platform: darwin-x86_64
          - platform: ubuntu-latest
            args: ''
            updater-platform: linux-x86_64
          - platform: windows-latest
            args: ''
            updater-platform: windows-x86_64
    runs-on: ${{ matrix.platform }}
    env:
      SCCACHE_GHA_ENABLED: 'true'
      RUSTC_WRAPPER: 'sccache'
    steps:
      - uses: actions/checkout@v6

      - name: Install Tauri system dependencies (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install Rust toolchain
        working-directory: backend
        run: rustup show

      - name: Run sccache-cache
        uses: mozilla-actions/sccache-action@v0.0.9

      - name: Cache Cargo dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: backend -> target
          cache-on-failure: true

      - name: Add Rust target (macOS cross-compile)
        if: matrix.platform == 'macos-latest'
        working-directory: backend
        run: rustup target add aarch64-apple-darwin x86_64-apple-darwin

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Get pnpm store directory
        id: pnpm-store
        shell: bash
        run: echo "path=$(pnpm store path)" >> "$GITHUB_OUTPUT"

      - name: Cache pnpm store
        uses: actions/cache@v5
        with:
          path: ${{ steps.pnpm-store.outputs.path }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('frontend/pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-store-

      - name: Install pnpm dependencies (frontend)
        run: cd frontend && pnpm install --frozen-lockfile

      - name: Override updater endpoint for nightly
        if: inputs.updater-endpoint
        shell: bash
        env:
          UPDATER_ENDPOINT: ${{ inputs.updater-endpoint }}
        run: |
          jq --arg endpoint "$UPDATER_ENDPOINT" \
            '.plugins.updater.endpoints = [$endpoint]' \
            backend/tauri.conf.json > backend/tauri.conf.json.tmp
          mv backend/tauri.conf.json.tmp backend/tauri.conf.json

      - name: Override app version for nightly
        if: inputs.nightly-version
        shell: bash
        env:
          NIGHTLY_VERSION: ${{ inputs.nightly-version }}
        run: |
          jq --arg version "$NIGHTLY_VERSION" \
            '.version = $version' \
            backend/tauri.conf.json > backend/tauri.conf.json.tmp
          mv backend/tauri.conf.json.tmp backend/tauri.conf.json

      - uses: tauri-apps/tauri-action@v0
        id: tauri-build
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: ./backend
          tagName: ${{ inputs.tag-name }}
          args: ${{ matrix.args }} ${{ inputs.nightly-version && '--features devtools' || '' }}

      - name: Generate updater metadata and prepare artifacts
        if: inputs.upload-artifact
        id: artifact-paths
        shell: bash
        env:
          ARTIFACT_PATHS: ${{ steps.tauri-build.outputs.artifactPaths }}
          UPDATER_PLATFORM: ${{ matrix.updater-platform }}
        run: |
          mkdir -p staging

          # Find the updater artifact (.app.tar.gz, .AppImage, or .exe) and its .sig
          updater_file=""
          sig_file=""
          for path in $(echo "$ARTIFACT_PATHS" | jq -r '.[]'); do
            case "$path" in
              *.app.tar.gz.sig) sig_file="$path" ;;
              *.app.tar.gz) updater_file="$path" ;;
              *.AppImage.sig) sig_file="$path" ;;
              *.AppImage) updater_file="$path" ;;
              *-setup.exe.sig) sig_file="$path" ;;
              *-setup.exe) updater_file="$path" ;;
            esac
          done

          if [ -z "$updater_file" ] || [ -z "$sig_file" ]; then
            echo "::error::Could not find updater artifact or signature for platform ${UPDATER_PLATFORM}"
            echo "Available artifacts:"
            echo "$ARTIFACT_PATHS" | jq -r '.[]'
            exit 1
          fi

          # For macOS, rename .app.tar.gz to include architecture to avoid collisions
          filename=$(basename "$updater_file")
          if [[ "$filename" == *.app.tar.gz ]]; then
            arch="${UPDATER_PLATFORM#darwin-}"
            new_filename="${filename%.app.tar.gz}_${arch}.app.tar.gz"
            cp "$updater_file" "staging/${new_filename}"
            cp "$sig_file" "staging/${new_filename}.sig"
            filename="$new_filename"
          else
            cp "$updater_file" "staging/$filename"
            cp "$sig_file" "staging/$(basename "$sig_file")"
          fi

          signature=$(cat "$sig_file")

          # Generate updater metadata JSON
          jq -n \
            --arg platform "$UPDATER_PLATFORM" \
            --arg filename "$filename" \
            --arg signature "$signature" \
            '{platform: $platform, filename: $filename, signature: $signature}' \
            > "staging/updater-metadata-${UPDATER_PLATFORM}.json"

          echo "Generated metadata:"
          cat "staging/updater-metadata-${UPDATER_PLATFORM}.json"

          # Also copy non-updater artifacts (dmg, deb, msi, rpm, etc.) for the release
          for path in $(echo "$ARTIFACT_PATHS" | jq -r '.[]'); do
            base=$(basename "$path")
            # Skip files already copied
            if [ -f "staging/$base" ]; then
              continue
            fi
            # Skip updater artifacts that were renamed (macOS)
            if [ "$path" = "$updater_file" ] || [ "$path" = "$sig_file" ]; then
              continue
            fi
            cp "$path" "staging/$base"
          done

      - name: Upload nightly artifacts
        if: inputs.upload-artifact
        uses: actions/upload-artifact@v4
        with:
          name: nightly-${{ matrix.updater-platform }}
          path: staging/
