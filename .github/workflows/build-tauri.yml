on:
  workflow_call:
    inputs:
      tag-name:
        description: 'Tag name for the release (omit for build-only mode)'
        required: false
        type: string
      upload-artifact:
        description: 'Upload build artifacts (for nightly builds)'
        required: false
        default: false
        type: boolean
      updater-endpoint:
        description: 'Override updater endpoint URL in tauri.conf.json'
        required: false
        type: string
      nightly-version:
        description: 'Override app version for nightly builds (e.g. 0.1.1-nightly.20260324)'
        required: false
        type: string

name: build-tauri

jobs:
  build-tauri:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: '--target aarch64-apple-darwin'
          - platform: macos-latest
            args: '--target x86_64-apple-darwin'
          - platform: ubuntu-latest
            args: ''
          - platform: windows-latest
            args: ''
    runs-on: ${{ matrix.platform }}
    env:
      SCCACHE_GHA_ENABLED: 'true'
      RUSTC_WRAPPER: 'sccache'
    steps:
      - uses: actions/checkout@v6

      - name: Install Tauri system dependencies (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install Rust toolchain
        working-directory: backend
        run: rustup show

      - name: Run sccache-cache
        uses: mozilla-actions/sccache-action@v0.0.9

      - name: Cache Cargo dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: backend -> target
          cache-on-failure: true

      - name: Add Rust target (macOS cross-compile)
        if: matrix.platform == 'macos-latest'
        working-directory: backend
        run: rustup target add aarch64-apple-darwin x86_64-apple-darwin

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Get pnpm store directory
        id: pnpm-store
        shell: bash
        run: echo "path=$(pnpm store path)" >> "$GITHUB_OUTPUT"

      - name: Cache pnpm store
        uses: actions/cache@v5
        with:
          path: ${{ steps.pnpm-store.outputs.path }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('frontend/pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-store-

      - name: Install pnpm dependencies (frontend)
        run: cd frontend && pnpm install --frozen-lockfile

      - name: Override updater endpoint for nightly
        if: inputs.updater-endpoint
        shell: bash
        env:
          UPDATER_ENDPOINT: ${{ inputs.updater-endpoint }}
        run: |
          jq --arg endpoint "$UPDATER_ENDPOINT" \
            '.plugins.updater.endpoints = [$endpoint]' \
            backend/tauri.conf.json > backend/tauri.conf.json.tmp
          mv backend/tauri.conf.json.tmp backend/tauri.conf.json

      - name: Override app version for nightly
        if: inputs.nightly-version
        shell: bash
        env:
          NIGHTLY_VERSION: ${{ inputs.nightly-version }}
        run: |
          jq --arg version "$NIGHTLY_VERSION" \
            '.version = $version' \
            backend/tauri.conf.json > backend/tauri.conf.json.tmp
          mv backend/tauri.conf.json.tmp backend/tauri.conf.json

      - uses: tauri-apps/tauri-action@v0
        id: tauri-build
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: ./backend
          tagName: ${{ inputs.tag-name }}
          args: ${{ matrix.args }}

      - name: Prepare nightly artifact paths
        if: inputs.upload-artifact
        id: artifact-paths
        shell: bash
        env:
          ARTIFACT_PATHS: ${{ steps.tauri-build.outputs.artifactPaths }}
        run: |
          {
            echo "paths<<EOF"
            echo "$ARTIFACT_PATHS" | jq -r '.[]'
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Upload nightly artifacts
        if: inputs.upload-artifact
        uses: actions/upload-artifact@v4
        with:
          name: nightly-${{ matrix.platform }}-${{ strategy.job-index }}
          path: ${{ steps.artifact-paths.outputs.paths }}
