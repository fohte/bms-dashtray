on:
  push:
    branches:
      - master
      - main

name: release-please

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release-created: ${{ steps.release.outputs.release_created }}
      tag-name: ${{ steps.release.outputs.tag_name }}
      prs-created: ${{ steps.release.outputs.prs_created }}
      pr: ${{ steps.release.outputs.pr }}
    steps:
      - uses: actions/create-github-app-token@v3
        id: app-token
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - uses: googleapis/release-please-action@v4
        id: release
        with:
          token: ${{ steps.app-token.outputs.token }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  update-cargo-lock:
    needs: release-please
    if: needs.release-please.outputs.prs-created == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Extract PR info
        id: pr-info
        env:
          PR_JSON: ${{ needs.release-please.outputs.pr }}
        run: |
          head_branch=$(echo "$PR_JSON" | jq -r '.headBranchName')
          echo "head_branch=$head_branch" >> "$GITHUB_OUTPUT"

      - uses: actions/create-github-app-token@v3
        id: app-token
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - uses: actions/checkout@v6
        with:
          token: ${{ steps.app-token.outputs.token }}
          ref: ${{ steps.pr-info.outputs.head_branch }}
          fetch-depth: 0

      - run: rustup show

      - name: Update Cargo.lock
        working-directory: backend
        run: cargo update --workspace

      - uses: suzuki-shunsuke/commit-action@v0.1.1
        with:
          commit_message: 'chore: update Cargo.lock'
          branch: ${{ steps.pr-info.outputs.head_branch }}
          workflow: deny
          github_token: ${{ steps.app-token.outputs.token }}

  build-release:
    needs: release-please
    if: needs.release-please.outputs.release-created == 'true'
    permissions:
      contents: write
    uses: ./.github/workflows/build-tauri.yml
    secrets: inherit
    with:
      tag-name: ${{ needs.release-please.outputs.tag-name }}

  nightly-version:
    needs: release-please
    if: needs.release-please.outputs.release-created != 'true' && github.event_name != 'workflow_dispatch'
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v6

      - name: Generate nightly version
        id: version
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          base_version=$(jq -r '.version' backend/tauri.conf.json)

          # Bump patch version so nightly is semver-greater than the current release.
          # e.g. base 0.1.2 -> bumped 0.1.3, nightly version 0.1.3-1
          # This ensures: release 0.1.2 < nightly 0.1.3-1 < next release 0.1.3
          IFS='.' read -r major minor patch <<< "$base_version"
          bumped_patch=$(( patch + 1 ))
          bumped_version="${major}.${minor}.${bumped_patch}"

          # Increment pre-release number from the last nightly release.
          # Resets to 1 when base version changes.
          nightly_num=1
          prev_version=$(gh release download nightly --pattern 'latest.json' --output - 2>/dev/null | jq -r '.version // empty') || true
          if [[ "$prev_version" =~ ^${bumped_version}-([0-9]+)$ ]]; then
            nightly_num=$(( BASH_REMATCH[1] + 1 ))
          fi

          nightly_version="${bumped_version}-${nightly_num}"
          echo "version=${nightly_version}" >> "$GITHUB_OUTPUT"

  build-nightly:
    needs: [release-please, nightly-version]
    if: needs.release-please.outputs.release-created != 'true' && github.event_name != 'workflow_dispatch'
    permissions:
      contents: write
    uses: ./.github/workflows/build-tauri.yml
    secrets: inherit
    with:
      upload-artifact: true
      updater-endpoint: https://github.com/fohte/bms-dashtray/releases/download/nightly/latest.json
      nightly-version: ${{ needs.nightly-version.outputs.version }}

  publish-nightly:
    needs: [release-please, nightly-version, build-nightly]
    if: needs.release-please.outputs.release-created != 'true' && github.event_name != 'workflow_dispatch'
    runs-on: ubuntu-latest
    concurrency:
      group: publish-nightly
      cancel-in-progress: true
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Download all nightly artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: nightly-*
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: find artifacts -type f | sort

      - name: Generate latest.json for updater
        env:
          NIGHTLY_VERSION: ${{ needs.nightly-version.outputs.version }}
          REPO: ${{ github.repository }}
        run: |
          base_url="https://github.com/${REPO}/releases/download/nightly"

          # Read signature files
          read_sig() {
            local pattern="$1"
            local sig_file
            sig_file=$(find artifacts -name "${pattern}" -type f | head -1)
            if [ -n "$sig_file" ]; then
              cat "$sig_file"
            else
              echo ""
            fi
          }

          darwin_aarch64_sig=$(read_sig "*aarch64.app.tar.gz.sig")
          darwin_x64_sig=$(read_sig "*x64.app.tar.gz.sig")
          linux_sig=$(read_sig "*.AppImage.tar.gz.sig")
          windows_nsis_sig=$(read_sig "*x64-setup.nsis.zip.sig")

          # Find artifact filenames (exclude .sig files)
          find_artifact() {
            local pattern="$1"
            find artifacts -name "${pattern}" -not -name "*.sig" -type f | head -1 | xargs -I{} basename {}
          }

          darwin_aarch64_file=$(find_artifact "*aarch64.app.tar.gz")
          darwin_x64_file=$(find_artifact "*x64.app.tar.gz")
          linux_file=$(find_artifact "*.AppImage.tar.gz")
          windows_nsis_file=$(find_artifact "*x64-setup.nsis.zip")

          # Build latest.json
          jq -n \
            --arg version "$NIGHTLY_VERSION" \
            --arg pub_date "$(date -u '+%Y-%m-%dT%H:%M:%SZ')" \
            --arg notes "Nightly build from ${GITHUB_SHA::7}" \
            --arg darwin_aarch64_url "${base_url}/${darwin_aarch64_file}" \
            --arg darwin_aarch64_sig "$darwin_aarch64_sig" \
            --arg darwin_x64_url "${base_url}/${darwin_x64_file}" \
            --arg darwin_x64_sig "$darwin_x64_sig" \
            --arg linux_url "${base_url}/${linux_file}" \
            --arg linux_sig "$linux_sig" \
            --arg windows_url "${base_url}/${windows_nsis_file}" \
            --arg windows_sig "$windows_nsis_sig" \
            '{
              version: $version,
              notes: $notes,
              pub_date: $pub_date,
              platforms: {
                "darwin-aarch64": { url: $darwin_aarch64_url, signature: $darwin_aarch64_sig },
                "darwin-x86_64": { url: $darwin_x64_url, signature: $darwin_x64_sig },
                "linux-x86_64": { url: $linux_url, signature: $linux_sig },
                "windows-x86_64": { url: $windows_url, signature: $windows_sig }
              }
            }' > artifacts/latest.json

          echo "Generated latest.json:"
          cat artifacts/latest.json

      - name: Delete existing nightly release
        run: gh release delete nightly --yes --cleanup-tag || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create nightly release
        run: |
          mapfile -t files < <(find artifacts -type f)
          gh release create nightly \
            --prerelease \
            --title "Nightly ($(date -u '+%Y-%m-%d'))" \
            --notes "$(cat <<NOTES
          Automated nightly build from [\`${GITHUB_SHA::7}\`](https://github.com/${{ github.repository }}/commit/${{ github.sha }}).

          > [!WARNING]
          > This is an unstable pre-release build. Use at your own risk.
          NOTES
          )" \
            "${files[@]}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
