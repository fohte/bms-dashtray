on:
  push:
    branches:
      - master
      - main

name: release-please

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release-created: ${{ steps.release.outputs.release_created }}
      tag-name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: actions/create-github-app-token@v2
        id: app-token
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - uses: googleapis/release-please-action@v4
        id: release
        with:
          token: ${{ steps.app-token.outputs.token }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  build-release:
    needs: release-please
    if: needs.release-please.outputs.release-created == 'true'
    uses: ./.github/workflows/build-tauri.yml
    with:
      tag-name: ${{ needs.release-please.outputs.tag-name }}

  build-nightly:
    needs: release-please
    if: needs.release-please.outputs.release-created != 'true' && github.event_name != 'workflow_dispatch'
    uses: ./.github/workflows/build-tauri.yml
    with:
      upload-artifact: true

  publish-nightly:
    needs: [release-please, build-nightly]
    if: needs.release-please.outputs.release-created != 'true' && github.event_name != 'workflow_dispatch'
    runs-on: ubuntu-latest
    concurrency:
      group: publish-nightly
      cancel-in-progress: true
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Download all nightly artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: nightly-*
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: find artifacts -type f | sort

      - name: Delete existing nightly release
        run: gh release delete nightly --yes --cleanup-tag || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create nightly release
        run: |
          gh release create nightly \
            --prerelease \
            --title "Nightly ($(date -u '+%Y-%m-%d'))" \
            --notes "$(cat <<NOTES
          Automated nightly build from [\`${GITHUB_SHA::7}\`](https://github.com/${{ github.repository }}/commit/${{ github.sha }}).

          > [!WARNING]
          > This is an unstable pre-release build. Use at your own risk.
          NOTES
          )" \
            artifacts/**/*
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
